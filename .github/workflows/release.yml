name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      # v0.7.1: need write so the final step can create a notes-only release
      # on this (source) repo. Binaries still ship from the public mirror.
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history (not just the tag commit) so the
          # 'Publish notes-only release to source repo' step can
          # walk back to the previous tag for the commit-bullet changelog.
          fetch-depth: 0

      - name: Read version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            # Manual dispatch — derive from package.json
            $pkg = Get-Content package.json | ConvertFrom-Json
            $version = $pkg.version
          } else {
            $version = $tag.Substring(1)
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "tag=v$version" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      # NOTE: setup_embedded_python.ps1 installs Python to %LOCALAPPDATA%\BETTER DISCOVERY\python
      # (NOT to src-tauri\binaries\python despite stale docstring). Currently Python is NOT
      # bundled into the installer — end users get it from a separate setup. This is an
      # architectural gap to address in a follow-up PR (bundle Python via tauri.conf.json
      # resources). For now CI just builds the .exe; Python bundling is out of scope here.

      - name: Install npm dependencies
        run: npm ci

      - name: Verify signing secrets are present
        shell: pwsh
        env:
          KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          PWD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:KEY)) {
            throw "TAURI_SIGNING_PRIVATE_KEY secret is missing or empty"
          }
          Write-Host "TAURI_SIGNING_PRIVATE_KEY: present, length = $($env:KEY.Length) chars"
          if ([string]::IsNullOrEmpty($env:PWD)) {
            Write-Host "TAURI_SIGNING_PRIVATE_KEY_PASSWORD: empty (key must have no password)"
          } else {
            Write-Host "TAURI_SIGNING_PRIVATE_KEY_PASSWORD: present, length = $($env:PWD.Length) chars"
          }
          # Sanity-check the key looks like a Tauri/minisign blob
          $decoded = [Text.Encoding]::ASCII.GetString([Convert]::FromBase64String($env:KEY))
          if ($decoded -notmatch "rsign encrypted secret key|untrusted comment") {
            Write-Host "WARNING: key does not look like a Tauri-generated minisign key. First 80 chars decoded:"
            Write-Host $decoded.Substring(0, [Math]::Min(80, $decoded.Length))
          } else {
            Write-Host "Key format: OK (looks like a Tauri/minisign secret key)"
          }

      - name: Build Tauri app (signed)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build --verbose

      - name: Locate artifacts, rename to safe filenames, build latest.json
        id: artifacts
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $tag       = "${{ steps.version.outputs.tag }}"
          $version   = "${{ steps.version.outputs.version }}"
          $bundleDir = "src-tauri/target/release/bundle"

          $nsisExe = Get-ChildItem -Path "$bundleDir/nsis" -Filter "*-setup.exe" | Select-Object -First 1
          $msi     = Get-ChildItem -Path "$bundleDir/msi"  -Filter "*.msi"          | Select-Object -First 1

          if (-not $nsisExe) { throw "NSIS installer not found" }
          if (-not $msi)     { throw "MSI installer not found" }

          # Rename to space-free names so GitHub doesn't mangle the URL on upload
          $newNsisName = "BetterDiscovery_${version}_x64-setup.exe"
          $newMsiName  = "BetterDiscovery_${version}_x64_en-US.msi"
          $newZipName  = "BetterDiscovery_${version}_x64-setup.nsis.zip"
          $newSigName  = "BetterDiscovery_${version}_x64-setup.nsis.zip.sig"

          $renamedNsis = Join-Path $nsisExe.DirectoryName $newNsisName
          $renamedMsi  = Join-Path $msi.DirectoryName     $newMsiName

          Move-Item -Force $nsisExe.FullName $renamedNsis
          Move-Item -Force $msi.FullName     $renamedMsi

          # Tauri updater expects a .nsis.zip containing the installer, plus a
          # matching .sig. The build only produces the raw .exe + .exe.sig —
          # we must package and re-sign for the updater to work.
          $zipPath = Join-Path $nsisExe.DirectoryName $newZipName
          Compress-Archive -Path $renamedNsis -DestinationPath $zipPath -Force
          Write-Host "Created updater zip: $newZipName"

          # Sign the .nsis.zip (the updater verifies THIS signature, not the .exe.sig)
          & npx tauri signer sign --private-key "$env:TAURI_SIGNING_PRIVATE_KEY" --password "$env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD" "$zipPath"
          $sigPath = "$zipPath.sig"
          if (-not (Test-Path $sigPath)) { throw ".nsis.zip.sig not created after signing" }

          $signature = (Get-Content $sigPath -Raw).Trim()
          $pubDate   = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $url       = "https://github.com/mysterkat/better-discovery-releases/releases/download/$tag/$newZipName"

          # Version must be bare semver (no "v" prefix) — Tauri compares it
          # against the app version in tauri.conf.json which has no prefix.
          $manifest = [ordered]@{
            version   = $version
            notes     = "See release page for details."
            pub_date  = $pubDate
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $signature
                url       = $url
              }
            }
          }

          $manifest | ConvertTo-Json -Depth 6 | Set-Content -Encoding utf8 latest.json
          Write-Host "--- latest.json ---"
          Get-Content latest.json

          echo "nsis_path=$renamedNsis"   >> $env:GITHUB_OUTPUT
          echo "msi_path=$renamedMsi"     >> $env:GITHUB_OUTPUT
          echo "zip_path=$zipPath"        >> $env:GITHUB_OUTPUT

      - name: Publish release to public repo
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        shell: pwsh
        run: |
          $tag       = "${{ steps.version.outputs.tag }}"
          $version   = "${{ steps.version.outputs.version }}"
          $nsisPath  = "${{ steps.artifacts.outputs.nsis_path }}"
          $msiPath   = "${{ steps.artifacts.outputs.msi_path }}"
          $zipPath   = "${{ steps.artifacts.outputs.zip_path }}"
          $repo      = "mysterkat/better-discovery-releases"

          # Delete prior release with this tag if it exists (idempotent re-runs)
          gh release view $tag --repo $repo *> $null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Existing release $tag found, deleting..."
            gh release delete $tag --repo $repo --yes --cleanup-tag
          }

          gh release create $tag `
            --repo $repo `
            --title "BETTER DISCOVERY $version" `
            --notes "Release $version. Built from private source repo." `
            "$nsisPath" `
            "$msiPath" `
            "$zipPath" `
            "latest.json"

      # ── v0.7.1: mirror a notes-only release to the source repo ───────────
      # No installers here (they live on the public mirror so the auto-updater
      # can fetch them). This entry exists purely for changelog / progress
      # tracking, so when you browse the source repo's Releases tab you see
      # every shipped version with full commit-level notes inline AND a
      # CHANGELOG.txt asset attached for offline browsing.
      - name: Publish notes-only release to source repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag     = "${{ steps.version.outputs.tag }}"
          $version = "${{ steps.version.outputs.version }}"
          $repo    = "${{ github.repository }}"
          $mirror  = "https://github.com/mysterkat/better-discovery-releases/releases/tag/$tag"

          # Find the previous tag for the commit range. If none (first
          # release), fall back to the root commit so we include everything.
          # 'git fetch --tags' guarantees we have all tags after a shallow
          # checkout; safe to run even if redundant.
          git fetch --tags --quiet
          # git describe returns null on stderr if no prior tag exists. Calling
          # .Trim() on null crashes pwsh with "you cannot call a method on a
          # null-valued expression" — so capture into a temp and null-check first.
          $prevTagRaw = git describe --tags --abbrev=0 "$tag^" 2>$null
          $prevTag = ""
          if ($prevTagRaw) { $prevTag = "$prevTagRaw".Trim() }
          if ([string]::IsNullOrWhiteSpace($prevTag)) {
            $rootRaw = git rev-list --max-parents=0 HEAD
            $prevTag = "$($rootRaw | Select-Object -First 1)".Trim()
            Write-Host "No previous tag found; using root commit $prevTag"
          } else {
            Write-Host "Diffing $prevTag..$tag"
          }

          # Build the bullet+body changelog from `git log`. Per commit:
          #   * **subject** (sha)
          #     <body indented 2 spaces>
          # Subject-only commits collapse cleanly to a single line.
          $changelog = & git log "$prevTag..$tag" `
            --pretty=format:"* **%s** (%h)%n%w(0,2,2)%b%n" `
            --no-merges
          if ([string]::IsNullOrWhiteSpace($changelog)) {
            $changelog = "_No commits between $prevTag and $tag._"
          }

          # Save to CHANGELOG.txt so we can attach as a release asset.
          $txt = @"
          BETTER DISCOVERY $version
          Released $(Get-Date -Format 'yyyy-MM-dd')
          Changes since $prevTag
          ================================================================

          $changelog
          "@
          $txt | Out-File -FilePath CHANGELOG.txt -Encoding utf8

          # Compose the release body. Includes the mirror link, the bullet
          # changelog inline, and a fallback compare URL for the diff view.
          $body = @"
          **Installers for this release live on the public mirror:**
          $mirror

          *(The mirror exists because the Tauri auto-updater needs a public download URL while this source repo is private.)*

          ---

          ## What changed since ``$prevTag``

          $changelog

          ---
          **Full diff:** https://github.com/$repo/compare/$prevTag...$tag
          "@

          # Idempotent: delete prior source-repo release if a previous CI run
          # already created one for this tag (e.g. on workflow re-run).
          gh release view $tag --repo $repo *> $null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Existing source-repo release $tag found, deleting..."
            gh release delete $tag --repo $repo --yes
          }

          gh release create $tag `
            --repo $repo `
            --title "BETTER DISCOVERY $version" `
            --notes "$body" `
            "CHANGELOG.txt"
