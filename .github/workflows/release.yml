name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            # Manual dispatch — derive from package.json
            $pkg = Get-Content package.json | ConvertFrom-Json
            $version = $pkg.version
          } else {
            $version = $tag.Substring(1)
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "tag=v$version" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Cache embedded Python
        id: cache-python
        uses: actions/cache@v4
        with:
          path: src-tauri/binaries/python
          # v3: previous v2 cache was poisoned (saved empty folder after a failed run)
          key: embedded-python-v3-${{ hashFiles('setup_embedded_python.ps1', 'backend/requirements.txt') }}

      - name: Detect partial / empty cache restore
        id: cache-check
        shell: pwsh
        run: |
          $exists = Test-Path "src-tauri\binaries\python\python.exe"
          echo "python_exists=$($exists.ToString().ToLower())" >> $env:GITHUB_OUTPUT
          Write-Host "python.exe present after cache restore: $exists"

      - name: Set up embedded Python runtime
        if: steps.cache-python.outputs.cache-hit != 'true' || steps.cache-check.outputs.python_exists != 'true'
        shell: pwsh
        run: |
          Set-ExecutionPolicy -Scope Process Bypass -Force
          .\setup_embedded_python.ps1

      - name: Verify embedded Python install integrity
        shell: pwsh
        run: |
          $pythonExe    = Resolve-Path "src-tauri\binaries\python\python.exe"
          $numpyTesting = "src-tauri\binaries\python\Lib\site-packages\numpy\testing\__init__.py"
          if (-not (Test-Path $numpyTesting)) {
            Write-Host "numpy.testing missing — forcing reinstall via $pythonExe"
            & $pythonExe -m pip install --force-reinstall --no-deps numpy==1.26.4
            if ($LASTEXITCODE -ne 0) { throw "pip reinstall numpy failed (exit $LASTEXITCODE)" }
          }
          if (-not (Test-Path $numpyTesting)) {
            throw "numpy.testing still missing after reinstall — embedded Python install is broken"
          }
          # Smoke-test: actually import numpy.testing in the embedded interpreter
          & $pythonExe -c "import numpy.testing; print('numpy.testing OK:', numpy.testing.__file__)"
          if ($LASTEXITCODE -ne 0) { throw "numpy.testing exists on disk but cannot be imported" }

      - name: Install npm dependencies
        run: npm ci

      - name: Verify signing secrets are present
        shell: pwsh
        env:
          KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          PWD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:KEY)) {
            throw "TAURI_SIGNING_PRIVATE_KEY secret is missing or empty"
          }
          Write-Host "TAURI_SIGNING_PRIVATE_KEY: present, length = $($env:KEY.Length) chars"
          if ([string]::IsNullOrEmpty($env:PWD)) {
            Write-Host "TAURI_SIGNING_PRIVATE_KEY_PASSWORD: empty (key must have no password)"
          } else {
            Write-Host "TAURI_SIGNING_PRIVATE_KEY_PASSWORD: present, length = $($env:PWD.Length) chars"
          }
          # Sanity-check the key looks like a Tauri/minisign blob
          $decoded = [Text.Encoding]::ASCII.GetString([Convert]::FromBase64String($env:KEY))
          if ($decoded -notmatch "rsign encrypted secret key|untrusted comment") {
            Write-Host "WARNING: key does not look like a Tauri-generated minisign key. First 80 chars decoded:"
            Write-Host $decoded.Substring(0, [Math]::Min(80, $decoded.Length))
          } else {
            Write-Host "Key format: OK (looks like a Tauri/minisign secret key)"
          }

      - name: Build Tauri app (signed)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build --verbose

      - name: Locate artifacts, rename to safe filenames, build latest.json
        id: artifacts
        shell: pwsh
        run: |
          $tag       = "${{ steps.version.outputs.tag }}"
          $version   = "${{ steps.version.outputs.version }}"
          $bundleDir = "src-tauri/target/release/bundle"

          $nsisExe = Get-ChildItem -Path "$bundleDir/nsis" -Filter "*-setup.exe" | Select-Object -First 1
          $nsisSig = Get-ChildItem -Path "$bundleDir/nsis" -Filter "*-setup.exe.sig" | Select-Object -First 1
          $msi     = Get-ChildItem -Path "$bundleDir/msi"  -Filter "*.msi"          | Select-Object -First 1

          if (-not $nsisExe) { throw "NSIS installer not found" }
          if (-not $nsisSig) { throw "NSIS signature not found — TAURI_SIGNING_PRIVATE_KEY may be unset or wrong" }
          if (-not $msi)     { throw "MSI installer not found" }

          # Rename to space-free names so GitHub doesn't mangle the URL on upload
          $newNsisName = "BetterDiscovery_${version}_x64-setup.exe"
          $newSigName  = "BetterDiscovery_${version}_x64-setup.exe.sig"
          $newMsiName  = "BetterDiscovery_${version}_x64_en-US.msi"

          $renamedNsis = Join-Path $nsisExe.DirectoryName $newNsisName
          $renamedSig  = Join-Path $nsisSig.DirectoryName $newSigName
          $renamedMsi  = Join-Path $msi.DirectoryName     $newMsiName

          Move-Item -Force $nsisExe.FullName $renamedNsis
          Move-Item -Force $nsisSig.FullName $renamedSig
          Move-Item -Force $msi.FullName     $renamedMsi

          $signature = (Get-Content $renamedSig -Raw).Trim()
          $pubDate   = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $url       = "https://github.com/mysterkat/better-discovery-releases/releases/download/$tag/$newNsisName"

          $manifest = [ordered]@{
            version   = $tag
            notes     = "See release page for details."
            pub_date  = $pubDate
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $signature
                url       = $url
              }
            }
          }

          $manifest | ConvertTo-Json -Depth 6 | Set-Content -Encoding utf8 latest.json
          Write-Host "--- latest.json ---"
          Get-Content latest.json

          echo "nsis_path=$renamedNsis" >> $env:GITHUB_OUTPUT
          echo "msi_path=$renamedMsi"   >> $env:GITHUB_OUTPUT

      - name: Publish release to public repo
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        shell: pwsh
        run: |
          $tag       = "${{ steps.version.outputs.tag }}"
          $version   = "${{ steps.version.outputs.version }}"
          $nsisPath  = "${{ steps.artifacts.outputs.nsis_path }}"
          $msiPath   = "${{ steps.artifacts.outputs.msi_path }}"
          $repo      = "mysterkat/better-discovery-releases"

          # Delete prior release with this tag if it exists (idempotent re-runs)
          gh release view $tag --repo $repo *> $null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Existing release $tag found, deleting..."
            gh release delete $tag --repo $repo --yes --cleanup-tag
          }

          gh release create $tag `
            --repo $repo `
            --title "BETTER DISCOVERY $version" `
            --notes "Release $version. Built from private source repo." `
            "$nsisPath" `
            "$msiPath" `
            "latest.json"
