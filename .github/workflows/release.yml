name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            # Manual dispatch — derive from package.json
            $pkg = Get-Content package.json | ConvertFrom-Json
            $version = $pkg.version
          } else {
            $version = $tag.Substring(1)
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "tag=v$version" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Cache embedded Python
        id: cache-python
        uses: actions/cache@v4
        with:
          path: src-tauri/binaries/python
          key: embedded-python-${{ hashFiles('setup_embedded_python.ps1', 'backend/requirements.txt') }}

      - name: Set up embedded Python runtime
        if: steps.cache-python.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Set-ExecutionPolicy -Scope Process Bypass -Force
          .\setup_embedded_python.ps1

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app (signed)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build

      - name: Locate build artifacts
        id: artifacts
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $bundleDir = "src-tauri/target/release/bundle"

          $nsisExe = Get-ChildItem -Path "$bundleDir/nsis" -Filter "*-setup.exe" | Select-Object -First 1
          $nsisSig = Get-ChildItem -Path "$bundleDir/nsis" -Filter "*-setup.exe.sig" | Select-Object -First 1
          $msi     = Get-ChildItem -Path "$bundleDir/msi"  -Filter "*.msi"          | Select-Object -First 1

          if (-not $nsisExe) { throw "NSIS installer not found" }
          if (-not $nsisSig) { throw "NSIS signature not found — TAURI_SIGNING_PRIVATE_KEY may be unset or wrong" }
          if (-not $msi)     { throw "MSI installer not found" }

          $signature = (Get-Content $nsisSig.FullName -Raw).Trim()
          echo "nsis_path=$($nsisExe.FullName)" >> $env:GITHUB_OUTPUT
          echo "nsis_name=$($nsisExe.Name)"     >> $env:GITHUB_OUTPUT
          echo "msi_path=$($msi.FullName)"      >> $env:GITHUB_OUTPUT
          echo "msi_name=$($msi.Name)"          >> $env:GITHUB_OUTPUT

          # Multiline output for signature
          $delimiter = "EOF_$([guid]::NewGuid().ToString('N'))"
          echo "signature<<$delimiter" >> $env:GITHUB_OUTPUT
          echo $signature              >> $env:GITHUB_OUTPUT
          echo $delimiter              >> $env:GITHUB_OUTPUT

      - name: Build latest.json manifest
        shell: pwsh
        run: |
          $version   = "${{ steps.version.outputs.version }}"
          $tag       = "${{ steps.version.outputs.tag }}"
          $nsisName  = "${{ steps.artifacts.outputs.nsis_name }}"
          $signature = @"
${{ steps.artifacts.outputs.signature }}
"@
          $signature = $signature.Trim()
          $pubDate   = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $encoded   = [uri]::EscapeUriString($nsisName)
          $url       = "https://github.com/mysterkat/better-discovery-releases/releases/download/$tag/$encoded"

          $manifest = [ordered]@{
            version   = $tag
            notes     = "See release page for details."
            pub_date  = $pubDate
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $signature
                url       = $url
              }
            }
          }

          $manifest | ConvertTo-Json -Depth 6 | Set-Content -Encoding utf8 latest.json
          Write-Host "--- latest.json ---"
          Get-Content latest.json

      - name: Publish release to public repo
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        shell: pwsh
        run: |
          $tag       = "${{ steps.version.outputs.tag }}"
          $version   = "${{ steps.version.outputs.version }}"
          $nsisPath  = "${{ steps.artifacts.outputs.nsis_path }}"
          $msiPath   = "${{ steps.artifacts.outputs.msi_path }}"
          $repo      = "mysterkat/better-discovery-releases"

          # Delete prior release with this tag if it exists (idempotent re-runs)
          gh release view $tag --repo $repo *> $null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Existing release $tag found, deleting..."
            gh release delete $tag --repo $repo --yes --cleanup-tag
          }

          gh release create $tag `
            --repo $repo `
            --title "BETTER DISCOVERY $version" `
            --notes "Release $version. Built from private source repo." `
            "$nsisPath" `
            "$msiPath" `
            "latest.json"
